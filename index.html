  /* High Contrast Mode Styles */
  /* This provides stronger visual distinction for users who need it. */

  /* Light High Contrast */
  .high-contrast {
    --hc-bg-primary: white;
    --hc-bg-secondary: #e0e0e0;
    --hc-text-primary: black;
    --hc-text-secondary: #111;
    --hc-border: #555;
    --hc-accent-bg: #0000d0; /* Strong blue */
    --hc-accent-text: white;
  }
  .high-contrast body, .high-contrast .bg-gray-100 { background-color: var(--hc-bg-primary) !important; color: var(--hc-text-primary) !important; }
  .high-contrast .bg-white, .high-contrast .bg-gray-200 { background-color: var(--hc-bg-secondary) !important; }
  .high-contrast .text-gray-800, .high-contrast .text-gray-900 { color: var(--hc-text-primary) !important; }
  .high-contrast .border-gray-200, .high-contrast .border-gray-300 { border-color: var(--hc-border) !important; }
  .high-contrast .bg-blue-500 { background-color: var(--hc-accent-bg) !important; color: var(--hc-accent-text) !important; }

  /* Dark High Contrast */
  .dark.high-contrast {
    --hc-dark-bg-primary: black;
    --hc-dark-bg-secondary: #222;
    --hc-dark-text-primary: white;
    --hc-dark-text-secondary: #eee;
    --hc-dark-border: #aaa;
    --hc-dark-accent-bg: #3b82f6; /* Bright blue */
    --hc-dark-accent-text: black;
  }
  .dark.high-contrast body, .dark.high-contrast .dark\:bg-gray-800, .dark.high-contrast .dark\:bg-gray-900 { background-color: var(--hc-dark-bg-primary) !important; color: var(--hc-dark-text-primary) !important; }
  .dark.high-contrast .dark\:bg-gray-700 { background-color: var(--hc-dark-bg-secondary) !important; }
  .dark.high-contrast .dark\:text-white, .dark.high-contrast .dark\:text-gray-100 { color: var(--hc-dark-text-primary) !important; }
  .dark.high-contrast .dark\:border-gray-700, .dark.high-contrast .dark\:border-gray-600 { border-color: var(--hc-dark-border) !important; }
  .dark.high-contrast .dark\:bg-blue-600, .dark.high-contrast .dark\:bg-blue-500 { background-color: var(--hc-dark-accent-bg) !important; color: var(--hc-dark-accent-text) !important; }
